<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>Financial Overview</title>
</head>

<body>

    <main class="register-page">
        <section class="register-container">
            <div class="register-hero">
                <h1>Create Account</h1>
                <p class="register-hero-text">Join FinTrack Pro</p>
            </div>

            <form class="register-form">
                <div class="register-fields">
                    <div class="register-field">
                        <label for="username">Choose a Username</label>
                        <input type="text" id="username" autocomplete="username" placeholder="username">
                    </div>

                    <div class="register-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="password">
                    </div>
                </div>

                <button type="submit" class="register-button">
                    Register
                </button>
                <p class="redirect">Already have an account? <a href="login.html">Login here</a></p>
            </form>
        </section>
    </main>


</body>

<script>
    const username = document.querySelector('#username');
    const password = document.querySelector('#password');

    const registerBtn = document.querySelector('.register-button');
    registerBtn.addEventListener('click', (event) => {
        event.preventDefault();

        const user = username.value;
        const pass = password.value;

        if (!user || !pass) {
            alert('username and password fields are required')
            return;
        }

        const userDetail = {
            username: user,
            password: pass,
            currency: '₹'
        }

        localStorage.setItem("userDetail", JSON.stringify(userDetail));

        window.location.replace('login.html')
    })
</script>

</html>
